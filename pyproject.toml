[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "hangman-game"
version = "1.0.0"
description = "A versatile, multilingual, kid-friendly Hangman game (English + Tamil) with auto-generated SVG art, a joyful web UI, and a colorful CLI."
readme = "README.md"
requires-python = ">=3.10"
authors = [{ name = "Interconnected" }]
keywords = ["hangman", "game", "kids", "multilingual", "tamil", "education"]
dependencies = [
    "flask>=3.0",
    "colorama>=0.4.6",
]

[project.optional-dependencies]
dev = ["pytest>=8.0"]

[project.scripts]
hangman = "hangman.cli:main"

[tool.setuptools]
package-dir = { "" = "src" }

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
hangman = ["languages/*.json"]

[tool.pytest.ini_options]
testpaths = ["tests"]
